<body>
    <form>
        <label for="Name">name</label>
        <input id="Name" type="text" placeholder="Enter name" required >
        <br><br>
 
         <label for="email">email</label>
        <input id="email" type="email" placeholder="Enter Email" required>

        <br><br>

         <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" required minlength="8">

        <br><br>
        <label for="Course">Select Course</label>                                                          
        <option  value="Front-end">Front-end-development</option>
        
        <option value="Bcak-end">Bcak-end-development</option>                                                                                             
        <option value="Data-Science">Data-Science</option> 
        <br><br>

        <label for="male">Male</label>
        <input type="radio" name="gender" value="Male">
        <br>
        <label for="female">Female</label>
        <input type="radio" name="gender" value="Female">
        <br>
        <label for="others">others</label>
        <input type="radio" name="gender" value="others">

        <br><br>
        <button style="margin-top: 2%;">Submit</button>
        <!-- jab hum submit button click krte hain to data server ko transfer ho jata hai.-->
    </form>
