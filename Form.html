<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="Name">name</label>
        <input type="text" placeholder="Enter name" required >
        <br><br>
 
         <label for="email">email</label>
        <input type="email" placeholder="Enter Email" required>

        <br><br>

         <label for="password">Password</label>
        <input type="password" placeholder="Enter password" required minlength="8">

        <br><br>
        <label for="Course">Select Course</label>                                                          
        <option  value="Front-end">Front-end-development</option>
        
        <option value="Bcak-end">Bcak-end-development</option>
        <option value="Data-Science">Data-Science</option> 
        <br><br>

        <label for="male">Male</label>
        <input type="radio" name="gender" value="Male">
        <br>
        <label for="female">Female</label>
        <input type="radio" name="gender" value="Female">
        <br>
        <label for="others">others</label>
        <input type="radio" name="gender" value="others">

        <br><br>
        <button style="margin-top: 2%;">Submit</button>
        <!-- jab hum submit button click krte hain to data server ko transfer ho jata hai.-->
    </form>
</body>
</html>
